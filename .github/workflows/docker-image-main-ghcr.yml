name: Publish Docker image (main -> GHCR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build & push single-arch (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:main-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:latest-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:sha-${{ env.SHORT_SHA }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    name: Create multi-arch manifests (GHCR)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (main)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:main \
            ghcr.io/${GHCR_REPOSITORY}:main-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:main-arm64

      - name: Create & push manifest (latest)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:latest \
            ghcr.io/${GHCR_REPOSITORY}:latest-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:latest-arm64

      - name: Create & push manifest (commit sha)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:sha-${SHORT_SHA} \
            ghcr.io/${GHCR_REPOSITORY}:sha-${SHORT_SHA}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:sha-${SHORT_SHA}-arm64
